version: '3.8'

services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ama_backend
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - laravel

  webserver:
    image: nginx:latest
    container_name: laravel_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx:/etc/nginx/conf.d
    networks:
      - laravel

  db:
    image: mysql:8.0
    container_name: ams_db_container
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ams_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    networks:
      - laravel

networks:
  laravel:
